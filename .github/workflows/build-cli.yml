name: Test CLI Build

on:
    push:
        branches: ['main']
        paths:
            - 'src/cli/**'
            - '.github/workflows/**'
    pull_request:
        branches: ['main']
        paths:
            - 'src/cli/**'
            - '.github/workflows/**'
    workflow_dispatch:

jobs:
    build:
        name: Build (${{ matrix.target }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Linux AMD64
                    - os: ubuntu-latest
                      target: linux-amd64
                      build_cmd: nuitka-linux
                    # Linux ARM64
                    - os: ubuntu-latest-arm
                      target: linux-arm64
                      build_cmd: nuitka-linux
                    # Windows AMD64
                    - os: windows-latest
                      target: windows-amd64
                      build_cmd: nuitka-windows
                    # Windows ARM64 
                    - os: windows-11-arm
                      target: windows-arm64
                      build_cmd: nuitka-windows

        defaults:
            run:
                working-directory: ./src/cli

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Install deps with uv
              run: uv sync --frozen

            - name: Build Binary
              run: uv run poe ${{ matrix.build_cmd }}

            - name: Show build outputs
              shell: bash # Use bash for consistent listing across OS
              run: ls -R .

            - name: Verify artifact exists
              shell: bash
              run: |
                  if ! ls ./app* >/dev/null 2>&1; then
                    echo "No artifact found"; exit 1
                  else
                    echo "Found artifact(s):"; ls ./app*
                  fi

            - name: Upload CLI artifact
              uses: actions/upload-artifact@v4
              with:
                  name: cli-${{ matrix.target }}
                  path: |
                    src/cli/app
                    src/cli/app.bin
                    src/cli/app.exe
                  if-no-files-found: error