name: CLI CI/CD

on:
  push:
    branches: ['main']
    tags: ['v*'] # Triggers on version tags
    paths:
      - 'src/cli/**'
      - '.github/workflows/**'
  pull_request:
    branches: ['main']
    paths:
      - 'src/cli/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            asset_name: chithi-cli-linux-amd64
            build_cmd: nuitka-linux
          - os: ubuntu-24.04-arm
            target: linux-arm64
            asset_name: chithi-cli-linux-arm64
            build_cmd: nuitka-linux
          - os: windows-latest
            target: windows-amd64
            asset_name: chithi-cli-windows-amd64.exe
            build_cmd: nuitka-windows
          - os: windows-latest-arm
            target: windows-arm64
            asset_name: chithi-cli-windows-arm64.exe
            build_cmd: nuitka-windows

    defaults:
      run:
        working-directory: ./src/cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build Binary
        run: uv run poe ${{ matrix.build_cmd }}

      - name: Rename Artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ -f "app.bin" ]; then mv app.bin ${{ matrix.asset_name }}
          elif [ -f "app" ]; then mv app ${{ matrix.asset_name }}
          else echo "Artifact not found"; exit 1; fi

      - name: Rename Artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "app.exe") { Move-Item "app.exe" "${{ matrix.asset_name }}" }
          else { throw "Artifact not found" }

      - name: Upload CI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: src/cli/${{ matrix.asset_name }}
          if-no-files-found: error

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: src/cli/${{ matrix.asset_name }}