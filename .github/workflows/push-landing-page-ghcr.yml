name: Publish Landing Page Docker Image to GHCR

on:
    push:
        branches: ['main']
        paths:
            - 'apps/landing-page/**'
            - '.github/workflows/push-landing-page-ghcr.yml'
    workflow_dispatch:

concurrency:
  group: push-landing-page-ghcr
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    defaults:
        run:
            working-directory: ./apps/landing-page

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/landing-page
          file: ./apps/landing-page/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-landing-page:latest
            ghcr.io/${{ github.repository }}-landing-page:${{ github.sha }}
            ghcr.io/${{ github.repository }}-landing-page:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
